<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blob -->
  <ellipse cx="200" cy="180" rx="280" ry="200" fill="url(#glow)"/>
  <ellipse cx="1050" cy="480" rx="220" ry="160" fill="#22c55e" fill-opacity="0.06"/>

  <!-- Grid pattern overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo icon -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="#22c55e"/>
  <path d="M103 136V109l30-6v30" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="97" cy="136" r="8" fill="white"/>
  <circle cx="127" cy="130" r="8" fill="white"/>

  <!-- Brand name -->
  <text x="172" y="108" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#f8fafc">Sol-fa</text>
  <text x="172" y="144" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#22c55e">Sanctuary</text>

  <!-- Divider line -->
  <line x1="80" y1="196" x2="440" y2="196" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Main headline -->
  <text x="80" y="290" font-family="Georgia, serif" font-size="68" font-weight="bold" fill="#f8fafc">Tonic Sol-fa</text>
  <text x="80" y="368" font-family="Georgia, serif" font-size="68" font-weight="bold" fill="#f8fafc">Music Sheets</text>

  <!-- Sub-headline -->
  <text x="80" y="430" font-family="system-ui, sans-serif" font-size="26" fill="#94a3b8">Discover · Share · Perform</text>

  <!-- Feature pills -->
  <rect x="80" y="470" width="140" height="40" rx="20" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1"/>
  <text x="150" y="495" font-family="system-ui, sans-serif" font-size="17" fill="#22c55e" text-anchor="middle">Choirs</text>

  <rect x="236" y="470" width="180" height="40" rx="20" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1"/>
  <text x="326" y="495" font-family="system-ui, sans-serif" font-size="17" fill="#22c55e" text-anchor="middle">Worship Teams</text>

  <rect x="432" y="470" width="160" height="40" rx="20" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.4" stroke-width="1"/>
  <text x="512" y="495" font-family="system-ui, sans-serif" font-size="17" fill="#22c55e" text-anchor="middle">Africa &amp; Beyond</text>

  <!-- URL -->
  <text x="80" y="582" font-family="system-ui, sans-serif" font-size="22" fill="#475569">solfasanctuary.com</text>

  <!-- Decorative music notes (right side) -->
  <g opacity="0.12" transform="translate(720, 60)">
    <!-- Staff lines -->
    <line x1="0" y1="180" x2="460" y2="180" stroke="#22c55e" stroke-width="2"/>
    <line x1="0" y1="210" x2="460" y2="210" stroke="#22c55e" stroke-width="2"/>
    <line x1="0" y1="240" x2="460" y2="240" stroke="#22c55e" stroke-width="2"/>
    <line x1="0" y1="270" x2="460" y2="270" stroke="#22c55e" stroke-width="2"/>
    <line x1="0" y1="300" x2="460" y2="300" stroke="#22c55e" stroke-width="2"/>

    <!-- Sol-fa syllables on staff -->
    <text x="40" y="268" font-family="Georgia, serif" font-size="48" fill="#22c55e" font-weight="bold">d</text>
    <text x="120" y="238" font-family="Georgia, serif" font-size="48" fill="#22c55e" font-weight="bold">r</text>
    <text x="200" y="208" font-family="Georgia, serif" font-size="48" fill="#22c55e" font-weight="bold">m</text>
    <text x="280" y="238" font-family="Georgia, serif" font-size="48" fill="#22c55e" font-weight="bold">f</text>
    <text x="360" y="208" font-family="Georgia, serif" font-size="48" fill="#22c55e" font-weight="bold">s</text>
  </g>
</svg>
